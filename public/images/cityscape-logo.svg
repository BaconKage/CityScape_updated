<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Cityscape Consulting logo</title>
  <desc id="desc">Yellow rectangular wordmark with a circular icon of four outlined squares and black Cityscape Consulting text.</desc>
  <rect width="720" height="220" rx="12" fill="#FFEA00" />
  <g transform="translate(36 38)" fill="none" stroke="#111111" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="78" cy="70" r="48" />
    <rect x="64" y="0" width="28" height="28" fill="#FFEA00" />
    <rect x="0" y="56" width="28" height="28" fill="#FFEA00" />
    <rect x="128" y="56" width="28" height="28" fill="#FFEA00" />
    <rect x="64" y="112" width="28" height="28" fill="#FFEA00" />
  </g>
  <g fill="#111111" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <text x="214" y="94" font-size="48" letter-spacing="2">CITYSCAPE</text>
    <text x="214" y="152" font-size="48" letter-spacing="2">CONSULTING</text>
